<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login // vbx.lol</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      color: #ccc;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 18px;
      color: white;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
    }

    .input-group input::placeholder {
      color: #333;
    }

    button {
      width: 100%;
      background: white;
      border: none;
      border-radius: 30px;
      padding: 14px;
      color: black;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    button:hover {
      background: #ddd;
    }

    .links {
      text-align: center;
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 28px;
    }

    .links a {
      color: #777;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .links a:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>vbx.lol</h1>
      </div>

      <form method="POST" action="/login">
        <div class="input-group">
          <label>EMAIL or USERNAME</label>
          <input type="text" name="username" placeholder="your@email.com or handle" required autocomplete="off">
        </div>

        <div class="input-group">
          <label>PASSWORD</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">LOGIN →</button>
      </form>

      <div class="links">
        <a href="/">HOME</a>
        <a href="/signup">CREATE ACCOUNT</a>
      </div>
    </div>
  </div>
</body>
</html>
